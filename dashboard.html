<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | LinkHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f9fafb;
            color: #111827;
            line-height: 1.5;
        }

        .navbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.25rem;
            color: #6b7280;
            transition: color 0.2s;
            padding: 0.5rem;
        }

        .btn-icon:hover {
            color: #2563eb;
        }

        .main-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        .profile-header {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .avatar-container {
            position: relative;
            cursor: pointer;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            transition: all 0.2s;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            color: white;
            font-size: 1.5rem;
        }

        .avatar-container:hover .avatar-overlay {
            opacity: 1;
        }

        .details h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .details p {
            color: #6b7280;
            font-size: 0.875rem;
        }

        .edit-btn {
            margin-left: auto;
            padding: 0.5rem 1rem;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-btn:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid #e5e7eb;
        }

        .stat-title {
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
        }

        .add-link-section {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #374151;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-primary {
            padding: 0.625rem 1.25rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .link-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }

        .link-card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .link-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .link-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        .link-url {
            font-size: 0.75rem;
            color: #6b7280;
            margin-bottom: 0.5rem;
            word-break: break-all;
        }

        .link-description {
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .link-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 1rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .btn-delete {
            padding: 0.375rem 0.75rem;
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #fecaca;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            color: #9ca3af;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 1rem;
            border: 1px solid #e5e7eb;
            color: #6b7280;
        }

        .photo-upload-area {
            border: 2px dashed #e5e7eb;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .photo-upload-area:hover {
            border-color: #2563eb;
            background: #f9fafb;
        }

        .photo-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-preview i {
            font-size: 3rem;
            color: #9ca3af;
        }

        .upload-hint {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.5rem;
        }

        .url-input-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .url-input-group input {
            flex: 1;
        }

        .btn-secondary {
            padding: 0.625rem 1rem;
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 1rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .profile-info {
                flex-direction: column;
                text-align: center;
            }
            
            .edit-btn {
                margin-left: 0;
            }
            
            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">LinkHub</div>
            <div class="nav-links">
                <button class="btn-icon" onclick="openPublicPage()">
                    <i class="fas fa-globe"></i>
                </button>
                <button class="btn-icon" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="profile-header">
            <div class="profile-info">
                <div class="avatar-container" onclick="openPhotoUpload()">
                    <div class="avatar" id="avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="avatar-overlay">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
                <div class="details">
                    <h1 id="displayName"></h1>
                    <p>@<span id="username"></span></p>
                    <p id="userBio" style="margin-top: 0.5rem;"></p>
                </div>
                <button class="edit-btn" onclick="openEditProfile()">
                    <i class="fas fa-edit"></i> Edit profile
                </button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Total Links</div>
                <div class="stat-value" id="totalLinks">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total Clicks</div>
                <div class="stat-value" id="totalClicks">0</div>
            </div>
        </div>

        <div class="add-link-section">
            <div class="section-title">Add new link</div>
            <form id="addLinkForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="linkTitle" placeholder="e.g., My Portfolio" required>
                    </div>
                    <div class="form-group">
                        <label>URL</label>
                        <input type="url" id="linkUrl" placeholder="https://example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description (optional)</label>
                    <textarea id="linkDescription" rows="2" placeholder="Brief description of this link"></textarea>
                </div>
                <button type="submit" class="btn-primary">Add link</button>
            </form>
        </div>

        <div class="section-title" style="margin-bottom: 1rem;">Your links</div>
        <div id="linksContainer"></div>
    </div>

    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit profile</h3>
                <span class="close-modal" onclick="closeEditProfile()">&times;</span>
            </div>
            <form id="editProfileForm">
                <div class="form-group">
                    <label>Display name</label>
                    <input type="text" id="editDisplayName" placeholder="Your display name">
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="editBio" rows="3" placeholder="Tell the world about yourself"></textarea>
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="url" id="editWebsite" placeholder="https://yourwebsite.com">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="editLocation" placeholder="City, Country">
                </div>
                <button type="submit" class="btn-primary">Save changes</button>
            </form>
        </div>
    </div>

    <div id="photoUploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Update profile picture</h3>
                <span class="close-modal" onclick="closePhotoUpload()">&times;</span>
            </div>
            
            <div class="photo-upload-area" onclick="document.getElementById('photoFileInput').click()">
                <div class="photo-preview" id="photoPreview">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <div class="upload-hint">
                    <i class="fas fa-upload"></i> Click to upload image from your device
                </div>
                <div class="upload-hint">or paste image URL below</div>
            </div>
            
            <input type="file" id="photoFileInput" accept="image/*" style="display: none;" onchange="handleFileUpload(this)">
            
            <div class="url-input-group">
                <input type="url" id="photoUrlInput" placeholder="https://example.com/your-photo.jpg">
                <button class="btn-secondary" onclick="uploadFromUrl()">Apply URL</button>
            </div>
            
            <button class="btn-primary" style="width: 100%; margin-top: 1rem;" onclick="savePhoto()">
                Save changes
            </button>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('userId');
        const username = localStorage.getItem('username');
        
        if (!userId || !username) {
            window.location.href = 'login.html';
        }

        let currentLinks = [];
        let tempPhotoUrl = '';

        async function loadUserData() {
            try {
                const response = await fetch(`https://myalllink-backend.onrender.com/api/users/${userId}`);
                const user = await response.json();
                
                document.getElementById('displayName').innerText = user.displayName || username;
                document.getElementById('username').innerText = user.username;
                document.getElementById('userBio').innerText = user.bio || '';
                
                if (user.avatar) {
                    const avatarDiv = document.getElementById('avatar');
                    avatarDiv.innerHTML = `<img src="${user.avatar}" alt="Profile">`;
                    localStorage.setItem('userAvatar', user.avatar);
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        async function loadStats() {
            try {
                const response = await fetch(`http://myalllink-backend.onrender.com/${userId}/stats`);
                const data = await response.json();
                document.getElementById('totalLinks').innerText = data.totalLinks;
                document.getElementById('totalClicks').innerText = data.totalClicks;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadLinks() {
            try {
                console.log('Loading links for user ID:', userId);
                const response = await fetch(`http://myalllink-backend.onrender.com/api/links/user/${userId}`);
                const links = await response.json();
                console.log('Loaded links:', links);
                currentLinks = links;
                displayLinks();
            } catch (error) {
                console.error('Error loading links:', error);
            }
        }

        function displayLinks() {
            const container = document.getElementById('linksContainer');
            
            if (currentLinks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-link" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>No links yet. Add your first link above!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="links-grid">
                    ${currentLinks.map(link => `
                        <div class="link-card">
                            <div class="link-icon">${getIconForUrl(link.url)}</div>
                            <div class="link-title">${escapeHtml(link.title)}</div>
                            <div class="link-url">${escapeHtml(link.url)}</div>
                            ${link.description ? `<div class="link-description">${escapeHtml(link.description)}</div>` : ''}
                            <div class="link-stats">
                                <span><i class="fas fa-chart-line"></i> ${link.clicks || 0} clicks</span>
                                <span><i class="far fa-calendar-alt"></i> ${new Date(link.created_at).toLocaleDateString()}</span>
                            </div>
                            <div class="card-actions">
                                <button class="btn-delete" onclick="deleteLink('${link._id}')">Delete</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function getIconForUrl(url) {
            if (url.includes('github')) return '🐙';
            if (url.includes('twitter')) return '🐦';
            if (url.includes('linkedin')) return '🔗';
            if (url.includes('youtube')) return '📺';
            if (url.includes('instagram')) return '📷';
            if (url.includes('facebook')) return '📘';
            return '🔗';
        }

        document.getElementById('addLinkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('linkTitle').value;
            const url = document.getElementById('linkUrl').value;
            const description = document.getElementById('linkDescription').value;
            
            if (!title || !url) {
                alert('Please fill in title and URL');
                return;
            }
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/links', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        username: username,
                        title: title,
                        url: url,
                        description: description,
                        order: currentLinks.length
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Link added:', data);
                    document.getElementById('addLinkForm').reset();
                    await loadLinks();
                    await loadStats();
                    alert('Link added successfully!');
                } else {
                    alert('Failed to add link');
                }
            } catch (error) {
                console.error('Error adding link:', error);
                alert('Error adding link');
            }
        });

        async function deleteLink(linkId) {
            if (confirm('Are you sure you want to delete this link?')) {
                try {
                    const response = await fetch(`http://127.0.0.1:5000/api/links/${linkId}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        await loadLinks();
                        await loadStats();
                        alert('Link deleted successfully!');
                    }
                } catch (error) {
                    console.error('Error deleting link:', error);
                    alert('Error deleting link');
                }
            }
        }

        function openEditProfile() {
            document.getElementById('editDisplayName').value = document.getElementById('displayName').innerText;
            document.getElementById('editBio').value = document.getElementById('userBio').innerText;
            document.getElementById('editWebsite').value = localStorage.getItem('userWebsite') || '';
            document.getElementById('editLocation').value = localStorage.getItem('userLocation') || '';
            document.getElementById('editProfileModal').style.display = 'flex';
        }

        function closeEditProfile() {
            document.getElementById('editProfileModal').style.display = 'none';
        }

        document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const displayName = document.getElementById('editDisplayName').value;
            const bio = document.getElementById('editBio').value;
            const website = document.getElementById('editWebsite').value;
            const location = document.getElementById('editLocation').value;
            
            try {
                const response = await fetch(`http://127.0.0.1:5000/api/users/${userId}/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ displayName, bio, website, location })
                });
                
                if (response.ok) {
                    localStorage.setItem('displayName', displayName);
                    localStorage.setItem('userBio', bio);
                    localStorage.setItem('userWebsite', website);
                    localStorage.setItem('userLocation', location);
                    await loadUserData();
                    closeEditProfile();
                    alert('Profile updated successfully!');
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                alert('Error updating profile');
            }
        });

        function openPhotoUpload() {
            tempPhotoUrl = '';
            document.getElementById('photoPreview').innerHTML = '<i class="fas fa-cloud-upload-alt"></i>';
            document.getElementById('photoUrlInput').value = '';
            document.getElementById('photoUploadModal').style.display = 'flex';
        }

        function closePhotoUpload() {
            document.getElementById('photoUploadModal').style.display = 'none';
        }

        function handleFileUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempPhotoUrl = e.target.result;
                    document.getElementById('photoPreview').innerHTML = `<img src="${tempPhotoUrl}" alt="Preview">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function uploadFromUrl() {
            const url = document.getElementById('photoUrlInput').value;
            if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
                tempPhotoUrl = url;
                document.getElementById('photoPreview').innerHTML = `<img src="${url}" alt="Preview" onerror="this.onerror=null;alert('Invalid image URL')">`;
            } else {
                alert('Please enter a valid image URL (starting with http:// or https://)');
            }
        }

        async function savePhoto() {
            if (!tempPhotoUrl) {
                alert('Please select or paste an image URL first');
                return;
            }
            
            try {
                const response = await fetch(`https://myalllink-backend.onrender.com/api/users/${userId}/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ avatar: tempPhotoUrl })
                });
                
                if (response.ok) {
                    localStorage.setItem('userAvatar', tempPhotoUrl);
                    await loadUserData();
                    closePhotoUpload();
                    alert('Profile picture updated successfully!');
                }
            } catch (error) {
                console.error('Error saving photo:', error);
                alert('Error saving photo. Please try again.');
            }
        }

        function openPublicPage() {
            window.open(`public.html?user=${username}`, '_blank');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        loadUserData();
        loadStats();
        loadLinks();
    </script>
</body>
