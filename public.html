<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkHub Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f9fafb;
            color: #111827;
            line-height: 1.5;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .profile-card {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            margin: 0 auto 1rem;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .display-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .username {
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .bio {
            color: #374151;
            font-size: 0.875rem;
            max-width: 480px;
            margin: 0 auto 1rem;
            line-height: 1.6;
        }

        .meta-info {
            display: flex;
            justify-content: center;
            gap: 1rem;
            font-size: 0.75rem;
            color: #6b7280;
        }

        .meta-info span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .meta-info a {
            color: #6b7280;
            text-decoration: none;
        }

        .meta-info a:hover {
            color: #2563eb;
        }

        .links-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-item {
            background: white;
            border-radius: 1rem;
            padding: 1rem 1.25rem;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }

        .link-item:hover {
            border-color: #d1d5db;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        .link-icon {
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            border-radius: 0.5rem;
        }

        .link-content {
            flex: 1;
        }

        .link-title {
            font-weight: 600;
            color: #111827;
            margin-bottom: 0.25rem;
        }

        .link-description {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .link-arrow {
            color: #9ca3af;
            font-size: 0.875rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 1rem;
            border: 1px solid #e5e7eb;
            color: #6b7280;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1.5rem 1rem;
            }
            
            .link-item {
                padding: 0.875rem 1rem;
            }
            
            .meta-info {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="profileContent">
            <div class="loading">Loading profile...</div>
        </div>
        <div id="linksContent">
            <div class="loading">Loading links...</div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const username = params.get('user');

        if (!username) {
            document.body.innerHTML = '<div class="container"><div class="empty-state">No user specified</div></div>';
        }

        let userId = null;

        async function loadProfile() {
            try {
                console.log('Loading profile for username:', username);
                const response = await fetch(`http://127.0.0.1:5000/api/users/by-username/${username}`);
                
                if (!response.ok) {
                    throw new Error('User not found');
                }
                
                const user = await response.json();
                console.log('User data:', user);
                
                userId = user._id;
                
                document.getElementById('profileContent').innerHTML = `
                    <div class="profile-card">
                        <div class="avatar">
                            ${user.avatar ? `<img src="${user.avatar}" alt="${user.username}">` : '<i class="fas fa-user"></i>'}
                        </div>
                        <div class="display-name">${escapeHtml(user.displayName || user.username)}</div>
                        <div class="username">@${user.username}</div>
                        ${user.bio ? `<div class="bio">${escapeHtml(user.bio)}</div>` : ''}
                        <div class="meta-info">
                            ${user.location ? `<span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(user.location)}</span>` : ''}
                            ${user.website ? `<span><i class="fas fa-link"></i> <a href="${user.website}" target="_blank">Website</a></span>` : ''}
                        </div>
                    </div>
                `;
                
                if (userId) {
                    await loadLinks();
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profileContent').innerHTML = `
                    <div class="profile-card">
                        <div class="avatar"><i class="fas fa-user"></i></div>
                        <div class="display-name">${username}</div>
                        <div class="username">@${username}</div>
                        <div class="bio">User profile not found</div>
                    </div>
                `;
                document.getElementById('linksContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>Unable to load profile</p>
                    </div>
                `;
            }
        }

        async function loadLinks() {
            try {
                console.log('Loading links for user ID:', userId);
                const response = await fetch(`http://127.0.0.1:5000/api/links/user/${userId}`);
                const links = await response.json();
                console.log('Loaded links:', links);
                
                if (!links || links.length === 0) {
                    document.getElementById('linksContent').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-link" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                            <p>No links to display yet.</p>
                        </div>
                    `;
                    return;
                }
                
                document.getElementById('linksContent').innerHTML = `
                    <div class="links-section">
                        ${links.map(link => `
                            <a href="${link.url}" class="link-item" target="_blank" onclick="trackClick('${link._id}')">
                                <div class="link-icon">${getIconForUrl(link.url)}</div>
                                <div class="link-content">
                                    <div class="link-title">${escapeHtml(link.title)}</div>
                                    ${link.description ? `<div class="link-description">${escapeHtml(link.description)}</div>` : ''}
                                </div>
                                <div class="link-arrow">
                                    <i class="fas fa-arrow-right"></i>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('Error loading links:', error);
                document.getElementById('linksContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>Error loading links. Please try again later.</p>
                    </div>
                `;
            }
        }

        async function trackClick(linkId) {
            try {
                await fetch(`https://myalllink-backend.onrender.com/api/links/${linkId}/click`, {
                    method: 'POST'
                });
                console.log('Click tracked for link:', linkId);
            } catch (error) {
                console.error('Error tracking click:', error);
            }
        }

        function getIconForUrl(url) {
            if (url.includes('github')) return '<i class="fab fa-github"></i>';
            if (url.includes('twitter')) return '<i class="fab fa-twitter"></i>';
            if (url.includes('linkedin')) return '<i class="fab fa-linkedin"></i>';
            if (url.includes('youtube')) return '<i class="fab fa-youtube"></i>';
            if (url.includes('instagram')) return '<i class="fab fa-instagram"></i>';
            if (url.includes('facebook')) return '<i class="fab fa-facebook"></i>';
            return '<i class="fas fa-link"></i>';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start loading
        loadProfile();
    </script>
</body>
</html>
